name: "Build Failure Analysis"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 'rel/*']

permissions:
  contents: read

env:
  BINLOG_MCP_VERSION: '1.0.0-preview.26268.3'

concurrency:
  group: build-failure-analysis-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-analyze:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with binary log
        id: build
        continue-on-error: true
        env:
          GITHUB_TOKEN: ''
        run: |
          set -o pipefail
          ./build.sh --binaryLog 2>&1 | tee /tmp/build-output.log

      - name: Put dotnet on PATH
        if: steps.build.outcome == 'failure'
        run: echo "$PWD/.dotnet" >> "$GITHUB_PATH"

      - name: Find binlog
        if: steps.build.outcome == 'failure'
        id: find-binlog
        run: |
          BINLOG=$(find artifacts/log -name '*.binlog' -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -n "$BINLOG" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$BINLOG" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install binlog-mcp
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        run: |
          mkdir -p /tmp/binlog-tool
          cat > /tmp/binlog-tool/nuget.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-eng" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" />
            </packageSources>
          </configuration>
          EOF
          dotnet tool install --global AITools.BinlogMcp \
            --configfile /tmp/binlog-tool/nuget.config \
            --version "$BINLOG_MCP_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Setup Node.js
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP SDK
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        run: cd .github/workflows/scripts && npm ci --ignore-scripts

      - name: Extract errors via binlog-mcp
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        id: extract-mcp
        continue-on-error: true
        run: |
          cd .github/workflows/scripts
          timeout 120 node extract-binlog-errors.js \
            "$GITHUB_WORKSPACE/${{ steps.find-binlog.outputs.path }}" \
            > /tmp/binlog-analysis.json 2>/tmp/binlog-extract.log
          if [ -s /tmp/binlog-analysis.json ] && node -e "JSON.parse(require('fs').readFileSync('/tmp/binlog-analysis.json','utf8'))" 2>/dev/null; then
            echo "extracted=true" >> "$GITHUB_OUTPUT"
          else
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            cat /tmp/binlog-extract.log
          fi

      - name: Extract errors from build log (fallback)
        if: steps.build.outcome == 'failure' && steps.extract-mcp.outputs.extracted != 'true'
        id: extract-fallback
        run: |
          node -e "
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/build-output.log', 'utf8').split('\n');
            const errors = lines.filter(l => /: error /i.test(l))
              .map(l => l.trim()).filter((v,i,a) => a.indexOf(v)===i).slice(0,30)
              .map(l => {
                const m = l.match(/^(.+)\((\d+),(\d+)\):\s*error\s+(\w+):\s*(.+?)(?:\s*\[(.+)\])?\$/);
                return m ? {severity:'error',code:m[4],message:m[5].trim(),file:m[1],line:+m[2],column:+m[3]} : {severity:'error',message:l};
              });
            fs.writeFileSync('/tmp/binlog-analysis.json', JSON.stringify({
              overview: 'Build failed. Errors extracted from build output.',
              errors: JSON.stringify(errors),
              warnings: 'N/A'
            }, null, 2));
          "
          echo "extracted=true" >> "$GITHUB_OUTPUT"

      - name: Analyze errors and generate report
        if: steps.build.outcome == 'failure' && (steps.extract-mcp.outputs.extracted == 'true' || steps.extract-fallback.outputs.extracted == 'true')
        env:
          BINLOG_DATA: /tmp/binlog-analysis.json
          GITHUB_WORKSPACE_PATH: ${{ github.workspace }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: node .github/workflows/scripts/analyze-errors.js

      - name: Post analysis comment
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fallback = `Build failed. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`;
            let analysis;
            try { analysis = fs.readFileSync('/tmp/analysis-result.md', 'utf8'); } catch { analysis = fallback; }

            const marker = '<!-- binlog-failure-analysis -->';
            const prNumber = context.payload.pull_request.number;

            const allComments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, per_page: 100 },
            );
            for (const c of allComments) {
              if (c.body.includes(marker)) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
              }
            }

            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
              body: [marker, '## 🔍 Build Failure Analysis', '', analysis, '', '---',
                `<sub>🤖 Generated using <a href="https://dev.azure.com/dnceng/public/_artifacts/feed/dotnet-eng/NuGet/AITools.BinlogMcp">binlog-mcp</a> · commit ${sha} · <a href="${runUrl}">workflow run</a></sub>`
              ].join('\n'),
            });

      - name: Post inline fix suggestions
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          BINLOG_DATA: /tmp/binlog-analysis.json
          GITHUB_WORKSPACE_PATH: ${{ github.workspace }}
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const postSuggestions = require('./.github/workflows/scripts/post-suggestions.js');
            await postSuggestions({ github, context, core });

      - name: Build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error::The build failed. See the '🔍 Build Failure Analysis' comment on the PR for details and suggested fixes."
          exit 1
