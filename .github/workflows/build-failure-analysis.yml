name: "Build Failure Analysis"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 'rel/*']

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: build-failure-analysis-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with binary log
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          ./build.sh --binaryLog 2>&1 | tee /tmp/build-output.log | tail -100

      - name: Put dotnet on PATH
        if: steps.build.outcome == 'failure'
        run: echo "$PWD/.dotnet" >> "$GITHUB_PATH"

      - name: Find binlog files
        if: steps.build.outcome == 'failure'
        id: find-binlog
        run: |
          # Find the most recent binlog — Arcade puts them under artifacts/log/
          BINLOG=$(find artifacts/log -name '*.binlog' -type f 2>/dev/null | head -1)
          if [ -z "$BINLOG" ]; then
            echo "No binlog found under artifacts/log/"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found binlog: $BINLOG"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$BINLOG" >> "$GITHUB_OUTPUT"
          fi

      - name: Install binlog-mcp tool
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        run: |
          # Create a standalone nuget.config to avoid package-source-mapping conflicts
          # with the repo's NuGet.config.
          mkdir -p /tmp/binlog-tool
          cat > /tmp/binlog-tool/nuget.config << 'NUGETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-eng" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          NUGETEOF
          dotnet tool install --global AITools.BinlogMcp \
            --configfile /tmp/binlog-tool/nuget.config \
            --prerelease
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Extract build errors from binlog
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        id: extract
        run: |
          node .github/workflows/scripts/extract-binlog-errors.js "${{ steps.find-binlog.outputs.path }}" > /tmp/binlog-analysis.json 2>/tmp/binlog-extract.log || true
          if [ -s /tmp/binlog-analysis.json ]; then
            echo "extracted=true" >> "$GITHUB_OUTPUT"
          else
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            echo "Extraction failed. Log:"
            cat /tmp/binlog-extract.log
          fi

      - name: Analyze errors with AI
        if: steps.extract.outputs.extracted == 'true'
        id: analyze
        uses: actions/github-script@v7
        env:
          BINLOG_DATA: /tmp/binlog-analysis.json
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.env.BINLOG_DATA, 'utf8'));

            // Build the prompt for AI analysis
            const prompt = `You are an MSBuild build failure analyst for the microsoft/testfx repository.
            Analyze the following build failure data extracted from an MSBuild binary log and provide:
            1. A concise summary of what failed
            2. The root cause(s) — group related errors together
            3. Suggested fix(es) for each root cause

            Keep your response concise and actionable. Use markdown formatting.

            ## Build Overview
            ${data.overview}

            ## Build Errors
            ${data.errors}

            ## Top Warnings
            ${data.warnings}`;

            let analysis;
            try {
              // Try GitHub Models API for AI analysis
              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'openai/gpt-4o-mini',
                  messages: [{ role: 'user', content: prompt }],
                  max_tokens: 2000,
                }),
              });

              if (response.ok) {
                const result = await response.json();
                analysis = result.choices?.[0]?.message?.content;
              }
            } catch (e) {
              core.info(`AI analysis unavailable: ${e.message}`);
            }

            // Fallback: format the raw data as markdown
            if (!analysis) {
              analysis = `### Build Overview\n\n${data.overview}\n\n### Errors\n\n${data.errors}`;
              // Truncate if too long
              if (analysis.length > 10000) {
                analysis = analysis.substring(0, 10000) + '\n\n... (truncated)';
              }
            }

            // Write analysis to file for the comment step
            fs.writeFileSync('/tmp/analysis-result.md', analysis);
            core.info('Analysis written to /tmp/analysis-result.md');

      - name: Post analysis comment on PR
        if: steps.build.outcome == 'failure' && steps.extract.outputs.extracted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let analysis = 'Build failed but binlog analysis could not be completed.';
            try {
              analysis = fs.readFileSync('/tmp/analysis-result.md', 'utf8');
            } catch (e) {
              core.info('No analysis file found, using fallback');
            }
            const marker = '<!-- binlog-failure-analysis -->';

            const prNumber = context.payload.pull_request.number;

            // Find and delete any previous analysis comment to avoid spam
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            for (const comment of comments.data) {
              if (comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              '## 🔍 Build Failure Analysis',
              '',
              'The build failed on this PR. Here\'s an automated analysis from the MSBuild binary log:',
              '',
              analysis,
              '',
              '---',
              `<sub>🤖 Generated automatically using <a href="https://dev.azure.com/dnceng/public/_artifacts/feed/dotnet-eng/NuGet/AITools.BinlogMcp">binlog-mcp</a> · commit ${sha}</sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

      - name: Fail the job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
