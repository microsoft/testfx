name: "Build Failure Analysis"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 'rel/*']

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: build-failure-analysis-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with binary log
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          ./build.sh --binaryLog 2>&1 | tee /tmp/build-output.log | tail -100

      - name: Put dotnet on PATH
        if: steps.build.outcome == 'failure'
        run: echo "$PWD/.dotnet" >> "$GITHUB_PATH"

      - name: Find binlog files
        if: steps.build.outcome == 'failure'
        id: find-binlog
        run: |
          BINLOG=$(find artifacts/log -name '*.binlog' -type f 2>/dev/null | head -1)
          if [ -z "$BINLOG" ]; then
            echo "No binlog found under artifacts/log/"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found binlog: $BINLOG ($(du -h "$BINLOG" | cut -f1))"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$BINLOG" >> "$GITHUB_OUTPUT"
          fi

      - name: Install binlog-mcp tool
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        id: install-tool
        run: |
          mkdir -p /tmp/binlog-tool
          cat > /tmp/binlog-tool/nuget.config << 'NUGETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-eng" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          NUGETEOF
          dotnet tool install --global AITools.BinlogMcp \
            --configfile /tmp/binlog-tool/nuget.config \
            --prerelease
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install MCP SDK
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        run: |
          cd .github/workflows/scripts
          npm init -y --silent 2>/dev/null
          npm install --save @modelcontextprotocol/sdk 2>&1 | tail -5

      - name: Extract errors via binlog-mcp (MCP protocol)
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        id: extract-mcp
        continue-on-error: true
        run: |
          cd .github/workflows/scripts
          timeout 120 node extract-binlog-errors.js \
            "$GITHUB_WORKSPACE/${{ steps.find-binlog.outputs.path }}" > /tmp/binlog-analysis.json 2>/tmp/binlog-extract.log
          if [ -s /tmp/binlog-analysis.json ]; then
            echo "extracted=true" >> "$GITHUB_OUTPUT"
            echo "MCP extraction succeeded"
          else
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            echo "MCP extraction failed:"
            cat /tmp/binlog-extract.log
          fi

      - name: Extract errors from build log (fallback)
        if: steps.build.outcome == 'failure' && (steps.extract-mcp.outputs.extracted != 'true')
        id: extract-fallback
        run: |
          # Use Node.js to produce valid JSON from build log (avoids escaping issues)
          node -e "
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build-output.log', 'utf8');
            const lines = log.split('\n');
            const errors = lines.filter(l => /: error /i.test(l))
              .map(l => l.trim())
              .filter((v, i, a) => a.indexOf(v) === i)
              .slice(0, 30)
              .join('\n');
            const warnings = lines.filter(l => /: warning /i.test(l))
              .map(l => l.trim())
              .filter((v, i, a) => a.indexOf(v) === i)
              .slice(0, 10)
              .join('\n');
            const result = {
              overview: 'Build failed. Errors extracted from build output log.',
              errors: errors || 'No error lines found',
              warnings: warnings || 'No warning lines found'
            };
            fs.writeFileSync('/tmp/binlog-analysis.json', JSON.stringify(result, null, 2));
          "
          echo "extracted=true" >> "$GITHUB_OUTPUT"
          echo "Fallback extraction from build log succeeded"

      - name: Analyze errors with AI
        if: steps.build.outcome == 'failure' && (steps.extract-mcp.outputs.extracted == 'true' || steps.extract-fallback.outputs.extracted == 'true')
        uses: actions/github-script@v7
        env:
          BINLOG_DATA: /tmp/binlog-analysis.json
          GITHUB_WORKSPACE_PATH: ${{ github.workspace }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const data = JSON.parse(fs.readFileSync(process.env.BINLOG_DATA, 'utf8'));
            const workspace = process.env.GITHUB_WORKSPACE_PATH;
            const headSha = process.env.PR_HEAD_SHA;
            const repo = context.repo;
            const repoUrl = `${process.env.GITHUB_SERVER_URL}/${repo.owner}/${repo.repo}`;

            // Convert an absolute path to a repo-relative path
            function toRelPath(absPath) {
              // Strip workspace prefix or common CI path patterns
              const patterns = [
                workspace + '/',
                workspace + '\\',
                /^\/home\/runner\/work\/[^/]+\/[^/]+\//,
                /^D:\\a\\[^\\]+\\[^\\]+\\/,
              ];
              let rel = absPath;
              for (const p of patterns) {
                if (typeof p === 'string' && rel.startsWith(p)) {
                  rel = rel.substring(p.length);
                  break;
                } else if (p instanceof RegExp) {
                  rel = rel.replace(p, '');
                }
              }
              return rel.replace(/\\/g, '/');
            }

            // Build a GitHub blob URL for a file + line
            function fileLink(absPath, line) {
              const rel = toRelPath(absPath);
              const url = `${repoUrl}/blob/${headSha}/${rel}`;
              return line ? `${url}#L${line}` : url;
            }

            // Build a short display name from path
            function shortName(absPath) {
              return absPath.split(/[/\\]/).slice(-2).join('/');
            }

            // Read source context for error files directly from the checkout
            const errorText = data.errors || '';
            let parsedErrors = [];
            try { parsedErrors = JSON.parse(errorText); } catch {}

            const sourceContexts = {};
            const seenFiles = new Set();
            for (const err of parsedErrors) {
              if (!err.file || !err.line || seenFiles.has(err.file)) continue;
              seenFiles.add(err.file);
              try {
                // Try both absolute path and workspace-relative path
                let filePath = err.file;
                if (!fs.existsSync(filePath)) {
                  // Try relative to workspace
                  const relPath = filePath.replace(/^.*?\/testfx\//, '');
                  filePath = path.join(workspace, relPath);
                }
                if (fs.existsSync(filePath)) {
                  const lines = fs.readFileSync(filePath, 'utf8').split('\n');
                  const start = Math.max(0, err.line - 6);
                  const end = Math.min(lines.length, err.line + 10);
                  const contextLines = lines.slice(start, end)
                    .map((l, i) => `${(start + i + 1).toString().padStart(4)} | ${l}`);
                  sourceContexts[err.file] = {
                    content: contextLines.join('\n'),
                    errorLine: err.line,
                  };
                }
              } catch {}
            }

            const prompt = [
              'You are an MSBuild build failure analyst for the microsoft/testfx repository.',
              'Analyze the following build failure data and provide:',
              '1. A concise summary of what failed',
              '2. The root cause(s) — group related errors together',
              '3. For each root cause, provide a **concrete code fix** using a markdown diff block:',
              '   ```diff',
              '   - old line',
              '   + new line',
              '   ```',
              '',
              'Keep your response concise and actionable. Use markdown formatting.',
              '',
              '## Build Overview',
              data.overview || 'N/A',
              '',
              '## Build Errors',
              data.errors || 'N/A',
            ];

            // Include source context in the AI prompt if available
            if (Object.keys(sourceContexts).length > 0) {
              prompt.push('', '## Source Context');
              for (const [file, ctx] of Object.entries(sourceContexts)) {
                const shortPath = file.split('/').slice(-2).join('/');
                prompt.push('', `### ${shortPath} (around line ${ctx.errorLine})`, '```csharp', ctx.content.trim(), '```');
              }
            }

            if (data.warnings && data.warnings !== 'No data') {
              prompt.push('', '## Top Warnings', data.warnings);
            }

            let analysis;

            // Try GitHub Models API (requires models:read permission on the repo)
            const endpoints = [
              'https://models.github.ai/inference/chat/completions',
              'https://models.inference.ai.azure.com/chat/completions',
            ];

            for (const endpoint of endpoints) {
              if (analysis) break;
              try {
                const response = await fetch(endpoint, {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [{ role: 'user', content: prompt.join('\n') }],
                    max_tokens: 2000,
                  }),
                });

                if (response.ok) {
                  const result = await response.json();
                  analysis = result.choices?.[0]?.message?.content;
                  core.info(`AI analysis succeeded via ${endpoint}`);
                } else {
                  const text = await response.text();
                  core.info(`${endpoint} returned ${response.status}: ${text.substring(0, 200)}`);
                }
              } catch (e) {
                core.info(`${endpoint} unavailable: ${e.message}`);
              }
            }

            // Structured fallback: format the MCP data as useful markdown
            if (!analysis) {
              const errorText = data.errors || 'No errors captured';
              const overviewText = data.overview || '';

              // The MCP tool returns errors as JSON array or plain text
              let parsedErrors = [];
              try {
                parsedErrors = JSON.parse(errorText);
              } catch {
                // Not JSON — try regex parsing for MSBuild text output
                const errorLines = errorText.split('\n').filter(l => l.trim());
                for (const line of errorLines) {
                  const match = line.match(/([^(]+)\((\d+),\d+\):\s*error\s+(\w+):\s*(.+?)(?:\s*\[|$)/);
                  if (match) {
                    const [, file, lineNum, code, msg] = match;
                    parsedErrors.push({ file, line: parseInt(lineNum), code, message: msg.trim() });
                  }
                }
              }

              const parts = [];

              // Overview section
              if (overviewText) {
                parts.push('### 📊 Build Overview', '', overviewText.trim());
              }

              // Errors section — group by file with links
              const realErrors = parsedErrors.filter(e => e.code && e.code !== undefined);
              if (realErrors.length > 0) {
                const byFile = {};
                for (const e of realErrors) {
                  const key = e.file || e.projectFile || 'unknown';
                  if (!byFile[key]) byFile[key] = [];
                  byFile[key].push(e);
                }

                parts.push('', '### ❌ Errors', '');
                for (const [fullPath, errors] of Object.entries(byFile)) {
                  const short = shortName(fullPath);
                  const link = fileLink(fullPath);
                  parts.push(`**[\`${short}\`](${link})**`);
                  const unique = [...new Map(errors.map(e => [`${e.code}:${e.message}`, e])).values()];
                  for (const e of unique) {
                    if (e.line) {
                      const lineLink = fileLink(fullPath, e.line);
                      parts.push(`- [\`${e.code}\` (line ${e.line})](${lineLink}): ${e.message}`);
                    } else {
                      parts.push(`- \`${e.code}\`: ${e.message}`);
                    }
                  }
                  parts.push('');
                }
              } else if (errorText && errorText !== 'No data') {
                parts.push('', '### ❌ Errors', '', '```', errorText, '```');
              }

              // Suggested fixes — with links to source
              if (Object.keys(sourceContexts).length > 0 && realErrors.length > 0) {
                parts.push('### 🔧 Suggested Fixes', '');

                for (const [fullPath, ctx] of Object.entries(sourceContexts)) {
                  const short = shortName(fullPath);
                  const fileErrors = realErrors.filter(e => e.file === fullPath);
                  if (fileErrors.length === 0) continue;

                  const unique = [...new Map(fileErrors.map(e => [`${e.code}:${e.message}`, e])).values()];

                  for (const err of unique) {
                    const errLink = fileLink(fullPath, err.line);
                    parts.push(`**[\`${short}\`](${errLink}) — \`${err.code}\`**`);
                    parts.push('');

                    // Show the source context around the error
                    parts.push('<details><summary>Source context (click to expand)</summary>', '');
                    parts.push('```csharp');
                    parts.push(ctx.content.trim());
                    parts.push('```');
                    parts.push('</details>', '');

                    // Generate fix suggestion based on error code
                    const fix = generateFixSuggestion(err, ctx);
                    if (fix) {
                      parts.push(fix, '');
                    }
                  }
                }
              }

              // Warnings section
              const warningText = data.warnings || '';
              if (warningText && warningText !== 'No data') {
                let warningCount = 0;
                try {
                  const parsed = JSON.parse(warningText);
                  warningCount = Array.isArray(parsed) ? parsed.length : 0;
                } catch {}
                if (warningCount > 0) {
                  parts.push(`<details><summary>⚠️ ${warningCount} warning(s)</summary>`, '', '```', warningText, '```', '</details>');
                }
              }

              analysis = parts.join('\n');
              if (analysis.length > 15000) {
                analysis = analysis.substring(0, 15000) + '\n\n... (truncated)';
              }
            }

            function generateFixSuggestion(err, ctx) {
              const lines = ctx.content.split('\n');
              // Find the error line in context
              const errorLineContent = lines.find(l => {
                const match = l.match(/^\s*(\d+)\s*\|/);
                return match && parseInt(match[1]) === err.line;
              });
              const rawLine = errorLineContent ? errorLineContent.replace(/^\s*\d+\s*\|\s?/, '') : null;

              const suggestions = {
                // Missing using directive / type not found
                'CS0246': () => {
                  const typeMatch = err.message.match(/name '(\w+)'/);
                  const typeName = typeMatch ? typeMatch[1] : null;
                  if (rawLine && rawLine.match(/^using /)) {
                    return `**Suggestion:** Remove the invalid using directive:\n\`\`\`diff\n- ${rawLine.trim()}\n\`\`\``;
                  }
                  if (typeName) {
                    return `**Suggestion:** Add the correct \`using\` directive for \`${typeName}\`, or check if the required NuGet package is referenced in the project file.`;
                  }
                  return '**Suggestion:** Add the missing `using` directive or NuGet package reference.';
                },
                // Type or namespace does not exist in namespace
                'CS0234': () => {
                  const nsMatch = err.message.match(/name '(\w+)' does not exist in the namespace '([^']+)'/);
                  if (nsMatch) {
                    return `**Suggestion:** The type \`${nsMatch[1]}\` was not found in \`${nsMatch[2]}\`. Check the namespace spelling or add the required package reference.`;
                  }
                  return null;
                },
                // Member not found
                'CS0117': () => {
                  const memMatch = err.message.match(/'([^']+)' does not contain a definition for '([^']+)'/);
                  if (memMatch) {
                    return `**Suggestion:** \`${memMatch[1]}\` does not have member \`${memMatch[2]}\`. Check the API documentation or use an alternative method.`;
                  }
                  return null;
                },
                // Cannot convert type
                'CS0029': () => '**Suggestion:** Add an explicit cast or use a compatible type.',
                // No overload matches
                'CS1501': () => '**Suggestion:** Check the method signature and ensure the correct number/types of arguments are passed.',
                // Ambiguous reference
                'CS0104': () => '**Suggestion:** Use a fully qualified type name to resolve the ambiguity.',
                // Missing semicolon / syntax
                'CS1002': () => rawLine ? `**Suggestion:** Add missing semicolon:\n\`\`\`diff\n- ${rawLine.trim()}\n+ ${rawLine.trim()};\n\`\`\`` : null,
                // Unexpected token
                'CS1513': () => '**Suggestion:** Check for a missing closing brace `}`.',
                'CS1514': () => '**Suggestion:** Check for a missing opening brace `{`.',
                // Duplicate definition
                'CS0111': () => '**Suggestion:** Remove the duplicate member definition or rename one of them.',
                // Inaccessible due to protection level
                'CS0122': () => '**Suggestion:** Change the accessibility modifier (e.g., from `private` to `internal` or `public`) or use a public API.',
                // Cannot implicitly convert
                'CS0266': () => '**Suggestion:** Add an explicit cast: `(TargetType)expression`.',
                // Nullable reference
                'CS8600': () => '**Suggestion:** Add a null check or use the null-forgiving operator `!` if the value is known to be non-null.',
                'CS8602': () => '**Suggestion:** Add a null check before dereferencing, or use `?.` (null-conditional operator).',
                'CS8604': () => '**Suggestion:** Ensure the argument is not null, or change the parameter to accept `null`.',
              };

              const handler = suggestions[err.code];
              if (handler) {
                const result = handler();
                if (result) return result;
              }

              // Generic suggestion for unknown error codes
              if (rawLine) {
                return `**Suggestion:** Review line ${err.line}:\n\`\`\`csharp\n${rawLine.trim()}\n\`\`\``;
              }
              return null;
            }

            fs.writeFileSync('/tmp/analysis-result.md', analysis);
            core.info('Analysis written to /tmp/analysis-result.md');

      - name: Post analysis comment on PR
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let analysis = 'Build failed but automated analysis could not be completed. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            try {
              analysis = fs.readFileSync('/tmp/analysis-result.md', 'utf8');
            } catch (e) {
              core.info('No analysis file found, using fallback message');
            }
            const marker = '<!-- binlog-failure-analysis -->';
            const prNumber = context.payload.pull_request.number;

            // Delete any previous analysis comment to avoid spam
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            for (const comment of comments.data) {
              if (comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              '## 🔍 Build Failure Analysis',
              '',
              analysis,
              '',
              '---',
              `<sub>🤖 Generated using <a href="https://dev.azure.com/dnceng/public/_artifacts/feed/dotnet-eng/NuGet/AITools.BinlogMcp">binlog-mcp</a> · commit ${sha} · <a href="${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}">workflow run</a></sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

      - name: Fail the job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
