name: "Build Failure Analysis"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 'rel/*']

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: build-failure-analysis-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with binary log
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          ./build.sh --binaryLog 2>&1 | tee /tmp/build-output.log | tail -100

      - name: Put dotnet on PATH
        if: steps.build.outcome == 'failure'
        run: echo "$PWD/.dotnet" >> "$GITHUB_PATH"

      - name: Find binlog files
        if: steps.build.outcome == 'failure'
        id: find-binlog
        run: |
          BINLOG=$(find artifacts/log -name '*.binlog' -type f 2>/dev/null | head -1)
          if [ -z "$BINLOG" ]; then
            echo "No binlog found under artifacts/log/"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found binlog: $BINLOG ($(du -h "$BINLOG" | cut -f1))"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$BINLOG" >> "$GITHUB_OUTPUT"
          fi

      - name: Install binlog-mcp tool
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        id: install-tool
        run: |
          mkdir -p /tmp/binlog-tool
          cat > /tmp/binlog-tool/nuget.config << 'NUGETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-eng" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          NUGETEOF
          dotnet tool install --global AITools.BinlogMcp \
            --configfile /tmp/binlog-tool/nuget.config \
            --prerelease
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install MCP SDK
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        run: |
          cd .github/workflows/scripts
          npm init -y --silent 2>/dev/null
          npm install --save @modelcontextprotocol/sdk 2>&1 | tail -5

      - name: Extract errors via binlog-mcp (MCP protocol)
        if: steps.build.outcome == 'failure' && steps.find-binlog.outputs.found == 'true'
        id: extract-mcp
        continue-on-error: true
        run: |
          cd .github/workflows/scripts
          timeout 120 node extract-binlog-errors.js \
            "$GITHUB_WORKSPACE/${{ steps.find-binlog.outputs.path }}" > /tmp/binlog-analysis.json 2>/tmp/binlog-extract.log
          if [ -s /tmp/binlog-analysis.json ]; then
            echo "extracted=true" >> "$GITHUB_OUTPUT"
            echo "MCP extraction succeeded"
          else
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            echo "MCP extraction failed:"
            cat /tmp/binlog-extract.log
          fi

      - name: Extract errors from build log (fallback)
        if: steps.build.outcome == 'failure' && (steps.extract-mcp.outputs.extracted != 'true')
        id: extract-fallback
        run: |
          # Use Node.js to produce valid JSON from build log (avoids escaping issues)
          node -e "
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build-output.log', 'utf8');
            const lines = log.split('\n');
            const errors = lines.filter(l => /: error /i.test(l))
              .map(l => l.trim())
              .filter((v, i, a) => a.indexOf(v) === i)
              .slice(0, 30)
              .join('\n');
            const warnings = lines.filter(l => /: warning /i.test(l))
              .map(l => l.trim())
              .filter((v, i, a) => a.indexOf(v) === i)
              .slice(0, 10)
              .join('\n');
            const result = {
              overview: 'Build failed. Errors extracted from build output log.',
              errors: errors || 'No error lines found',
              warnings: warnings || 'No warning lines found'
            };
            fs.writeFileSync('/tmp/binlog-analysis.json', JSON.stringify(result, null, 2));
          "
          echo "extracted=true" >> "$GITHUB_OUTPUT"
          echo "Fallback extraction from build log succeeded"

      - name: Analyze errors with AI
        if: steps.build.outcome == 'failure' && (steps.extract-mcp.outputs.extracted == 'true' || steps.extract-fallback.outputs.extracted == 'true')
        uses: actions/github-script@v7
        env:
          BINLOG_DATA: /tmp/binlog-analysis.json
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.env.BINLOG_DATA, 'utf8'));

            const prompt = [
              'You are an MSBuild build failure analyst for the microsoft/testfx repository.',
              'Analyze the following build failure data and provide:',
              '1. A concise summary of what failed',
              '2. The root cause(s) — group related errors together',
              '3. Suggested fix(es) for each root cause',
              '',
              'Keep your response concise and actionable. Use markdown formatting.',
              '',
              '## Build Overview',
              data.overview || 'N/A',
              '',
              '## Build Errors',
              data.errors || 'N/A',
              '',
              '## Top Warnings',
              data.warnings || 'N/A',
            ].join('\n');

            let analysis;

            // Try GitHub Models API (requires models:read permission on the repo)
            const endpoints = [
              'https://models.github.ai/inference/chat/completions',
              'https://models.inference.ai.azure.com/chat/completions',
            ];

            for (const endpoint of endpoints) {
              if (analysis) break;
              try {
                const response = await fetch(endpoint, {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [{ role: 'user', content: prompt }],
                    max_tokens: 2000,
                  }),
                });

                if (response.ok) {
                  const result = await response.json();
                  analysis = result.choices?.[0]?.message?.content;
                  core.info(`AI analysis succeeded via ${endpoint}`);
                } else {
                  const text = await response.text();
                  core.info(`${endpoint} returned ${response.status}: ${text.substring(0, 200)}`);
                }
              } catch (e) {
                core.info(`${endpoint} unavailable: ${e.message}`);
              }
            }

            // Structured fallback: format the MCP data as useful markdown
            if (!analysis) {
              const errorText = data.errors || 'No errors captured';
              const overviewText = data.overview || '';

              // The MCP tool returns errors as JSON array or plain text
              let parsedErrors = [];
              try {
                parsedErrors = JSON.parse(errorText);
              } catch {
                // Not JSON — try regex parsing for MSBuild text output
                const errorLines = errorText.split('\n').filter(l => l.trim());
                for (const line of errorLines) {
                  const match = line.match(/([^(]+)\((\d+),\d+\):\s*error\s+(\w+):\s*(.+?)(?:\s*\[|$)/);
                  if (match) {
                    const [, file, lineNum, code, msg] = match;
                    parsedErrors.push({ file, line: parseInt(lineNum), code, message: msg.trim() });
                  }
                }
              }

              const parts = [];

              // Overview section
              if (overviewText) {
                parts.push('### 📊 Build Overview', '', overviewText.trim());
              }

              // Errors section — group by file
              const realErrors = parsedErrors.filter(e => e.code && e.code !== undefined);
              if (realErrors.length > 0) {
                const byFile = {};
                for (const e of realErrors) {
                  const file = (e.file || e.projectFile || 'unknown').split('/').slice(-2).join('/');
                  if (!byFile[file]) byFile[file] = [];
                  byFile[file].push(e);
                }

                parts.push('', '### ❌ Errors', '');
                for (const [file, errors] of Object.entries(byFile)) {
                  parts.push(`**\`${file}\`**`);
                  // Deduplicate by code+message
                  const unique = [...new Map(errors.map(e => [`${e.code}:${e.message}`, e])).values()];
                  for (const e of unique) {
                    const loc = e.line ? ` (line ${e.line})` : '';
                    parts.push(`- \`${e.code}\`${loc}: ${e.message}`);
                  }
                  parts.push('');
                }
              } else if (errorText && errorText !== 'No data') {
                parts.push('', '### ❌ Errors', '', '```', errorText, '```');
              }

              // Warnings section
              const warningText = data.warnings || '';
              if (warningText && warningText !== 'No data') {
                let warningCount = 0;
                try {
                  const parsed = JSON.parse(warningText);
                  warningCount = Array.isArray(parsed) ? parsed.length : 0;
                } catch {}
                if (warningCount > 0) {
                  parts.push(`<details><summary>⚠️ ${warningCount} warning(s)</summary>`, '', '```', warningText, '```', '</details>');
                }
              }

              analysis = parts.join('\n');
              if (analysis.length > 15000) {
                analysis = analysis.substring(0, 15000) + '\n\n... (truncated)';
              }
            }

            fs.writeFileSync('/tmp/analysis-result.md', analysis);
            core.info('Analysis written to /tmp/analysis-result.md');

      - name: Post analysis comment on PR
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let analysis = 'Build failed but automated analysis could not be completed. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            try {
              analysis = fs.readFileSync('/tmp/analysis-result.md', 'utf8');
            } catch (e) {
              core.info('No analysis file found, using fallback message');
            }
            const marker = '<!-- binlog-failure-analysis -->';
            const prNumber = context.payload.pull_request.number;

            // Delete any previous analysis comment to avoid spam
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            for (const comment of comments.data) {
              if (comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              '## 🔍 Build Failure Analysis',
              '',
              analysis,
              '',
              '---',
              `<sub>🤖 Generated using <a href="https://dev.azure.com/dnceng/public/_artifacts/feed/dotnet-eng/NuGet/AITools.BinlogMcp">binlog-mcp</a> · commit ${sha} · <a href="${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}">workflow run</a></sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

      - name: Fail the job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
