name: XLF manual-edit guard

# Repository policy (.github/copilot-instructions.md → Localization Guidelines):
#   "NEVER manually modify *.xlf files. Instead, regenerate them by running
#    `dotnet msbuild <project>.csproj /t:UpdateXlf` on the owning project."
#
# A human-authored PR may legitimately touch .xlf files only when those changes
# are the OUTPUT of /t:UpdateXlf after a .resx edit — in which case the same
# PR will also contain a .resx change. This workflow fails the check when a
# human-authored PR touches .xlf files with no corresponding .resx change.
#
# Bot PRs (OneLocBuild dotnet-bot, dotnet-maestro, any GitHub App identity)
# are exempted at the job level via the `if:` below, so the PowerShell script
# stays focused on diff analysis and doesn't need to know about workflow
# context.
#
# Tamper-resistance:
# - `pull_request_target` runs the workflow definition from the BASE ref so
#   a PR cannot weaken the gate by editing this file in the same PR.
# - actions/checkout below is pinned to the PR HEAD so `git diff` still
#   evaluates the PR's tree (not the base tree) against BASE_REF.
# - The run step sources the PowerShell script from the BASE commit too,
#   so the script can't be weakened in the same PR either.
# - This workflow has `permissions: contents: read` only and uses no
#   secrets, so the elevated default token for `pull_request_target` is
#   inert here — the standard PWN risk does not apply.

on:
  pull_request_target:
    paths:
      - '**/*.xlf'
      - '**/*.resx'
      - '.github/scripts/check-xlf-manual-edit.ps1'
      - '.github/workflows/xlf-manual-edit-guard.yml'

permissions:
  contents: read

concurrency:
  group: xlf-manual-edit-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check for manual xlf edits
    # Skip the guard entirely when the PR is opened by a known
    # localization/dependency bot. `user.type == 'Bot'` covers GitHub App
    # identities (the `*[bot]` accounts), and the explicit login allow-list
    # covers regular user accounts owned by the loc/dep pipelines.
    if: >-
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.user.login != 'dotnet-bot' &&
      github.event.pull_request.user.login != 'dotnet-maestro'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # On `pull_request_target`, checkout defaults to the base ref, which
          # would leave HEAD == base and make the diff empty. Pin HEAD to the
          # PR head SHA so `git diff $BASE_REF...HEAD` reflects the PR.
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history so the BASE_REF SHA below is reachable for `git diff`
          # and `git show`.
          fetch-depth: 0

      - name: Run xlf manual-edit guard
        shell: pwsh
        env:
          # Pin the diff base to the immutable PR-event base SHA so a
          # base-branch advance between the event and the checkout fetch
          # can't pull in unrelated commits and false-flag .xlf paths.
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          # Source the guard script from the trusted base commit so a PR
          # cannot weaken its own gate by editing the script in the same
          # PR. We still diff the PR's working tree (HEAD vs BASE_REF) for
          # the actual policy check. Falls back to the PR working copy
          # only when the script doesn't exist at the base — e.g. the PR
          # that first introduces this guard, before it lives on `main`.
          $scriptPath = '.github/scripts/check-xlf-manual-edit.ps1'
          $tempPath   = Join-Path $env:RUNNER_TEMP 'check-xlf-manual-edit.ps1'
          $base       = $env:BASE_REF
          $content    = & git show "${base}:${scriptPath}" 2>$null
          if ($LASTEXITCODE -eq 0 -and $content) {
            if ($content -is [System.Array]) { $content = $content -join "`n" }
            Set-Content -LiteralPath $tempPath -Value $content -NoNewline -Encoding utf8
            & pwsh -NoProfile -File $tempPath
          }
          else {
            Write-Host "::notice::Guard script not present at base ${base}; running PR version (bootstrap)."
            & pwsh -NoProfile -File "./$scriptPath"
          }
          exit $LASTEXITCODE
