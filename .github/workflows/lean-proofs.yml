name: Lean Proofs

# 🔬 Lean Squad — CI workflow for formal verification proofs.
# Runs `lake build` to verify Lean 4 proofs in formal-verification/lean/.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "formal-verification/lean/**"
      - ".github/workflows/lean-proofs.yml"
  push:
    branches:
      - main
    paths:
      - "formal-verification/lean/**"
  workflow_dispatch:

jobs:
  lean-build:
    name: Build Lean proofs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Lean source files
        id: check-lean-files
        run: |
          LEAN_COUNT=$(find formal-verification/lean/FVSquad -name "*.lean" 2>/dev/null | wc -l)
          echo "lean_count=${LEAN_COUNT}" >> "$GITHUB_OUTPUT"
          if [ "${LEAN_COUNT}" -eq 0 ]; then
            echo "No .lean files found in FVSquad/ — skipping Lean build."
          else
            echo "Found ${LEAN_COUNT} .lean file(s). Proceeding with build."
          fi

          # Check for lake-manifest.json (committed manifest pins Lean dependencies).
          if [ -f "formal-verification/lean/lake-manifest.json" ]; then
            echo "has_manifest=true" >> "$GITHUB_OUTPUT"
            echo "✅ lake-manifest.json present — dependencies are pinned"
          else
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ lake-manifest.json missing — 'lake update' will run and requires network access"
          fi

      - name: Restore elan + Lake cache
        id: restore-cache
        if: steps.check-lean-files.outputs.lean_count != '0'
        uses: actions/cache@v4
        with:
          path: |
            formal-verification/lean/.lake
            formal-verification/lean/lake-manifest.json
            ~/.elan
          key: lean-${{ runner.os }}-${{ hashFiles('formal-verification/lean/lean-toolchain', 'formal-verification/lean/lakefile.toml', 'formal-verification/lean/lake-manifest.json') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Install elan (Lean version manager)
        if: steps.check-lean-files.outputs.lean_count != '0' && steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          # elan v3.1.0 is the latest stable release with verified binaries.
          # Note: the elan GitHub release page does NOT ship *.sha256 files for
          # v3.1.0, so we do a file-size sanity check instead of sha256sum.
          ELAN_VERSION="v3.1.0"
          ELAN_TARGET="x86_64-unknown-linux-gnu"
          ELAN_ARCHIVE="elan-${ELAN_TARGET}.tar.gz"
          ELAN_BASE_URL="https://github.com/leanprover/elan/releases/download/${ELAN_VERSION}"
          ELAN_TMP_DIR="$(mktemp -d)"

          LEAN_TOOLCHAIN_FILE="formal-verification/lean/lean-toolchain"

          if [ ! -f "${LEAN_TOOLCHAIN_FILE}" ]; then
            echo "Missing Lean toolchain file: ${LEAN_TOOLCHAIN_FILE}" >&2
            exit 1
          fi

          LEAN_TOOLCHAIN="$(tr -d '\r\n' < "${LEAN_TOOLCHAIN_FILE}")"

          if [ -z "${LEAN_TOOLCHAIN}" ]; then
            echo "Lean toolchain file is empty: ${LEAN_TOOLCHAIN_FILE}" >&2
            exit 1
          fi

          # Download elan archive. No sha256 companion file is published for
          # this release, so we verify the archive is non-empty instead.
          curl -sSfL "${ELAN_BASE_URL}/${ELAN_ARCHIVE}" -o "${ELAN_TMP_DIR}/${ELAN_ARCHIVE}"
          ARCHIVE_SIZE=$(stat -c%s "${ELAN_TMP_DIR}/${ELAN_ARCHIVE}" 2>/dev/null || stat -f%z "${ELAN_TMP_DIR}/${ELAN_ARCHIVE}")
          if [ "${ARCHIVE_SIZE:-0}" -lt 1000000 ]; then
            echo "elan archive appears corrupt or too small (${ARCHIVE_SIZE} bytes)" >&2
            exit 1
          fi
          cd "${ELAN_TMP_DIR}"
          tar -xzf "${ELAN_ARCHIVE}"
          ./elan-init -y --default-toolchain "${LEAN_TOOLCHAIN}"
          rm -rf "${ELAN_TMP_DIR}"

      - name: Add elan to PATH
        if: steps.check-lean-files.outputs.lean_count != '0'
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean version
        if: steps.check-lean-files.outputs.lean_count != '0'
        run: lean --version

      - name: Resolve Lean dependencies
        # Run on cache miss; a committed lake-manifest.json still keeps dependency versions pinned.
        if: steps.check-lean-files.outputs.lean_count != '0' && steps.restore-cache.outputs.cache-hit != 'true'
        working-directory: formal-verification/lean
        run: lake update

      - name: Build Lean proofs
        if: steps.check-lean-files.outputs.lean_count != '0'
        working-directory: formal-verification/lean
        run: lake build

      - name: Annotate sorry occurrences
        if: steps.check-lean-files.outputs.lean_count != '0'
        run: |
          LEAN_DIR="formal-verification/lean/FVSquad"
          # Emit a GitHub Actions warning annotation for each line containing sorry,
          # so reviewers see them inline in the Files Changed tab.
          while IFS= read -r match; do
              FILE="${match%%:*}"
              REST="${match#*:}"
              LINENUM="${REST%%:*}"
              echo "::warning file=${FILE},line=${LINENUM}::sorry — proof stub pending"
            done < <(grep -rn '\<sorry\>' "${LEAN_DIR}" --include='*.lean' 2>/dev/null || true)

      - name: Proof summary
        if: steps.check-lean-files.outputs.lean_count != '0'
        run: |
          LEAN_DIR="formal-verification/lean/FVSquad"
          THEOREM_COUNT=$(grep -rEc '^(theorem|lemma) ' "${LEAN_DIR}" --include='*.lean' 2>/dev/null || echo 0)
          SORRY_COUNT=$(grep -rEc '\<sorry\>' "${LEAN_DIR}" --include='*.lean' 2>/dev/null \
            | awk -F: '{sum += $2} END {print sum+0}')
          SORRY_STATUS="✅ All proofs complete"
          if [ "${SORRY_COUNT}" -gt 0 ]; then
            SORRY_STATUS="⚠️ ${SORRY_COUNT} sorry (stub) lines remain"
          fi
          {
            echo "## 🔬 Lean Proof Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Theorems / Lemmas declared | ${THEOREM_COUNT} |"
            echo "| Lines containing \`sorry\` (stubs) | ${SORRY_COUNT} |"
            echo "| Proof status | ${SORRY_STATUS} |"
            echo ""
            echo "### Per-file breakdown (recursive)"
            echo ""
            echo "| File | Theorems | sorry lines |"
            echo "|------|----------|-------------|"
            while IFS= read -r f; do
              FNAME="$(basename "$f")"
              FTHEOREMS=$(grep -Ec '^(theorem|lemma) ' "$f" 2>/dev/null || echo 0)
              FSORRY=$(grep -Ec '\<sorry\>' "$f" 2>/dev/null || echo 0)
              echo "| \`${FNAME}\` | ${FTHEOREMS} | ${FSORRY} |"
            done < <(find "${LEAN_DIR}" -name "*.lean" 2>/dev/null | sort)
          } >> "$GITHUB_STEP_SUMMARY"
