name: Update curated Copilot skills/agents

# Onboards microsoft/testfx for automatic refresh of gh-copilot-curate managed
# plugins (dotnet/skills: dotnet-test + dotnet-msbuild). Runs weekly, re-resolves
# the refs pinned in .copilot/curate/manifest.yml, re-installs the skills/agents
# under .agents/skills/ and .github/agents/, and opens a PR if anything changed.
#
# NOTE on ref strategy: `gh copilot-curate update` re-resolves each plugin's pin.
# A plugin pinned to an immutable tag/SHA (e.g. dotnet-msbuild @ v1.0.0) will NOT
# move on its own — bump the pin in manifest.yml when a new dotnet/skills release
# ships, or change the pin to a moving ref (e.g. `main`) to track latest. The
# dotnet-test plugin is pinned to a SHA and behaves the same way.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gh-copilot-curate
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install Evangelink/gh-copilot-curate

      - name: Update curated plugins
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh copilot-curate update

      - name: Verify state is consistent
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh copilot-curate verify

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update curated Copilot skills/agents"
          title: "chore: update curated Copilot skills/agents"
          body: |
            Automated update of gh-copilot-curate managed plugins (skills + agents)
            from dotnet/skills. Generated by the `copilot-curate-update` workflow.
          branch: copilot-curate/autoupdate
          delete-branch: true
          labels: automation
