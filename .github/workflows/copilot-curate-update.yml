name: Update curated Copilot skills/agents

# Onboards microsoft/testfx for automatic refresh of gh-copilot-curate managed
# plugins (dotnet/skills: dotnet-test + dotnet-msbuild). Runs weekly, re-resolves
# the refs pinned in .copilot/curate/manifest.yml, re-installs the skills/agents
# under .agents/skills/ and .github/agents/, and opens a PR if anything changed.
#
# NOTE on ref strategy: `gh copilot-curate update` re-resolves each plugin's pin.
# The dotnet-msbuild plugin tracks the `main` branch of dotnet/skills, so skill
# and agent improvements flow in automatically on each run. A plugin pinned to an
# immutable tag/SHA (e.g. dotnet-test) will NOT move on its own — bump its pin in
# manifest.yml when a new dotnet/skills release ships, or switch it to a moving
# ref (e.g. `main`) to track latest.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# One in-flight update at a time so scheduled + manual runs don't race on the
# shared copilot-curate/autoupdate branch.
concurrency:
  group: copilot-curate-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install gh-copilot-curate
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install Evangelink/gh-copilot-curate --pin v0.6.0

      - name: Update curated plugins
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh copilot-curate update

      - name: Verify state is consistent
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh copilot-curate verify

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v7
        with:
          commit-message: "chore: update curated Copilot skills/agents"
          title: "chore: update curated Copilot skills/agents"
          body: |
            Automated update of gh-copilot-curate managed plugins (skills + agents)
            from dotnet/skills. Generated by the `copilot-curate-update` workflow.
          branch: copilot-curate/autoupdate
          delete-branch: true
          labels: automation
