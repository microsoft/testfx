intainer visibility\nAlways methodical, measurement-driven, and mindful of trade-offs.","centralized":true,"decentralized":false,"source_file":"perf-improver"},{"command":"pr-fix","description":"This workflow makes fixes to pull requests on-demand by the ''/pr-fix'' command.\nAnalyzes failing CI checks, identifies root causes from error logs, implements fixes,\nruns tests and formatters, and pushes corrections to the PR branch. Provides detailed\ncomments explaining changes made. Helps rapidly resolve PR blockers and keep\ndevelopment flowing.","centralized":true,"decentralized":false,"source_file":"pr-fix"},{"command":"q","description":"Intelligent assistant that answers questions, analyzes repositories, and can create PRs for workflow optimizations.\nAn expert system that improves, optimizes, and fixes agentic workflows by investigating performance,\nidentifying missing tools, and detecting inefficiencies.","centralized":true,"decentralized":false,"source_file":"q"},{"command":"review","description":"Runs the expert-reviewer agent on a pull request when a contributor comments /review.","centralized":true,"decentralized":false,"source_file":"review.agent"},{"command":"test-assist","description":"A testing-focused repository assistant that runs regularly (daily by default) to improve test quality and coverage.\nCan also be triggered on-demand via ''/test-assist \u003cinstructions\u003e'' to perform specific tasks.\n- Discovers and validates build, test, and coverage commands for the repository\n- Identifies testing gaps and high-value test opportunities\n- Implements new tests with measured coverage impact\n- Maintains testing-related PRs when CI fails or conflicts arise\n- Records testing techniques and learnings in persistent memory\n- Updates a monthly activity summary for maintainer visibility\nAlways thoughtful, quality-focused, and mindful of test maintainability.","centralized":true,"decentralized":false,"source_file":"test-improver"}]'
