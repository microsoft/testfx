id: ScheduledSearch.MarkNoRecentActivity
name: GitOps.PullRequestIssueManagement
description: Mark issues and pull requests with no recent activity
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    scheduledSearches:
      - description: >-
          Search for PR where -
          * Pull Request is Open
          * Pull request does not have the label "state/stale"
          * Pull request has the label "needs/author-feedback"
          * Has not had activity in the last 7 days

          Then -
          * Add "state/stale" label
          * Warn user about pending closure
        frequencies:
          - hourly:
              hour: 6
        filters:
          - isPullRequest
          - isOpen
          - isNotLabeledWith:
              label: "state/stale"
          - hasLabel:
              label: "needs/author-feedback"
          - noActivitySince:
              days: 7
        actions:
          - addLabel:
              label: "state/stale"
          - addReply:
              reply: >-
                Hello ${issueAuthor},

                This pull request has been automatically marked as stale because it has been marked as requiring author feedback but has not had any activity for **7 days**. It will be closed if no further activity occurs **within 7 days of this comment**.
      - description: >-
          Search for Issues where -
          * Issue is Open
          * Issue has the label "needs/author-feedback"
          * Issue does not have the label "state/stale"
          * Has not had activity in the last 7 days

          Then -
          * Add "state/stale" label
          * Warn user about pending closure
        frequencies:
          - hourly:
              hour: 6
        filters:
          - isIssue
          - isOpen
          - hasLabel:
              label: "needs/author-feedback"
          - isNotLabeledWith:
              label: "state/stale"
          - noActivitySince:
              days: 7
        actions:
          - addLabel:
              label: "state/stale"
          - addReply:
              reply: >-
                Hello ${issueAuthor},

                This issue has been automatically marked as stale because it has been marked as requiring author feedback but has not had any activity for **7 days**. It will be closed if no further activity occurs **within 7 days of this comment**.
onFailure:
onSuccess:
