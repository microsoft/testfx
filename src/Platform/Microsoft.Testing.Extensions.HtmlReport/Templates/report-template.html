* { box-sizing: border-box; }

html, body {

  color: var(--fg);

.summary-card.errored .value { color: var(--error); }

  margin-bottom: 16px;

.meta b { color: var(--fg); font-weight: 600; }

  background: var(--bg-card);
  color: var(--fg);
  font-family: inherit;
  font-size: 13px;

  padding: 6px 10px;
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--fg);
  font-family: inherit;
  font-size: 13px;

}

}

}

  border-radius: 6px;
  overflow: hidden;
}

.results-header {
  background: var(--bg-alt);

}

.results-header .sortable { cursor: pointer; }
.results-header .sortable.active { color: var(--accent); }

.test-row { cursor: pointer; }
.test-row:hover { background: var(--bg-alt); }
.test-row:last-child { border-bottom: none; }

.test-row .duration {
  font-variant-numeric: tabular-nums;
  text-align: right;
  color: var(--fg-muted);
  font-size: 12px;
}

.test-row .name {

  text-overflow: ellipsis;
  white-space: nowrap;
}

.test-row .name .display { font-weight: 500; }

  font-size: 12px;
  color: var(--fg-muted);
  font-family: var(--mono);

}

.outcome {

  letter-spacing: 0.04em;
  padding: 2px 8px;

  font-weight: 600;

.outcome.skipped  { color: var(--skip);    background: var(--skip-bg); }

.outcome.errored  { color: var(--error);   background: var(--error-bg); }

.chevron {

.test-row.expanded .chevron { transform: rotate(90deg); }

.detail {

  border-bottom: 1px solid var(--border);
  background: var(--bg-alt);
  font-size: 13px;

  border-top: 1px solid var(--border);

  color: var(--fg-muted);

  color: var(--fg);

  font-size: 12px;

}

.pager button[disabled] {

  cursor: not-allowed;
}

.group-header {

  grid-template-columns: 24px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
  font-weight: 600;
  font-size: 13px;

.group-header:first-child { border-top: none; }
.group-header .chevron { transition: transform 0.15s ease; color: var(--fg-muted); }
.group-header.collapsed .chevron { transform: rotate(-90deg); }
.group-header .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.group-header .group-counts .count {

  border-radius: 999px;
  font-variant-numeric: tabular-nums;
}
.group-header .group-counts .count.passed   { color: var(--pass);    background: var(--pass-bg); }
.group-header .group-counts .count.failed   { color: var(--fail);    background: var(--fail-bg); }
.group-header .group-counts .count.skipped  { color: var(--skip);    background: var(--skip-bg); }
.group-header .group-counts .count.timedOut { color: var(--timeout); background: var(--timeout-bg); }
.group-header .group-counts .count.errored  { color: var(--error);   background: var(--error-bg); }
.group-header .group-counts .count.total    { color: var(--fg-muted); background: transparent; border: 1px solid var(--border); }

.badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  margin-left: 6px;
  border-radius: 999px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: var(--fg-muted);
  vertical-align: middle;
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
}

.trait {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  margin-left: 4px;
  border-radius: 4px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: var(--fg-muted);
  font-family: var(--mono);
}

footer {
  text-align: center;
  color: var(--fg-muted);
  font-size: 12px;
  padding: 16px;
}

@media (max-width: 640px) {
  .results-header,
  .test-row {
    grid-template-columns: 80px minmax(0, 1fr) 24px;
  }

  .results-header .duration,
  .test-row .duration { display: none; }

  .detail { padding-left: 16px; }
}

      { v: "class",    l: "Class" },

    var q = state.search.trim().toLowerCase();

    var filtered = [];

      });
    } else { // outcome
      filtered.sort(function (a, b) {
        var ao = OUTCOME_ORDER[a.outcome] != null ? OUTCOME_ORDER[a.outcome] : 99;
        var bo = OUTCOME_ORDER[b.outcome] != null ? OUTCOME_ORDER[b.outcome] : 99;
        if (ao !== bo) return (ao - bo) * dir;
        var an = (a.displayName || "").toLowerCase();
        var bn = (b.displayName || "").toLowerCase();
        return an < bn ? -1 : an > bn ? 1 : 0;
      });
    }

    return filtered;
  }

  function renderRows() {
    var rowsContainer = document.getElementById("rows");
    var pager = document.getElementById("pager");
    var empty = document.getElementById("empty");
    var filtered = applyFilters();

    rowsContainer.innerHTML = "";

    if (filtered.length === 0) {
      empty.hidden = false;
      pager.hidden = true;
      return;
    }
    empty.hidden = true;

    if (state.groupBy === "none") {
      renderFlat(rowsContainer, pager, filtered);
    } else {
      renderGrouped(rowsContainer, pager, filtered);
    }
  }

  function renderFlat(rowsContainer, pager, filtered) {
    var totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    if (state.page >= totalPages) state.page = totalPages - 1;
    if (state.page < 0) state.page = 0;

    var startIdx = state.page * state.pageSize;
    var endIdx = Math.min(filtered.length, startIdx + state.pageSize);

    var frag = document.createDocumentFragment();
    for (var i = startIdx; i < endIdx; i++) {
      frag.appendChild(buildRow(filtered[i]));
    }
    rowsContainer.appendChild(frag);

    if (filtered.length > state.pageSize) {
      buildPager(pager, totalPages, startIdx, endIdx, filtered.length);
    } else {
      pager.hidden = true;
    }
  }

  function renderGrouped(rowsContainer, pager, filtered) {
    // Bucket the filtered tests into groups.
    var buckets = Object.create(null);
    var order = [];
    for (var i = 0; i < filtered.length; i++) {
      var keys = groupKeysFor(filtered[i]);
      for (var k = 0; k < keys.length; k++) {
        var id = keys[k];
        if (!buckets[id]) {
          buckets[id] = { id: id, tests: [], counts: { passed:0, failed:0, skipped:0, timedOut:0, errored:0 } };
          order.push(id);
        }
        buckets[id].tests.push(filtered[i]);
        var o = filtered[i].outcome;
        if (buckets[id].counts[o] != null) buckets[id].counts[o]++;
      }
    }

    // Sort groups: duration buckets keep their natural order; otherwise by id.
    order.sort(function (a, b) {
      if (state.groupBy === "duration") {
        return groupSortIndex(a) - groupSortIndex(b);
      }
      var ai = (a || "").toLowerCase();
      var bi = (b || "").toLowerCase();
      return ai < bi ? -1 : ai > bi ? 1 : 0;
    });

    pager.hidden = true;
    var frag = document.createDocumentFragment();
    for (var g = 0; g < order.length; g++) {
      var bucket = buckets[order[g]];
      frag.appendChild(buildGroupHeader(bucket));
      if (!state.collapsedGroups[bucket.id]) {
        for (var j = 0; j < bucket.tests.length; j++) {
          frag.appendChild(buildRow(bucket.tests[j]));
        }
      }
    }
    rowsContainer.appendChild(frag);
  }

  function buildGroupHeader(bucket) {
    var hdr = document.createElement("div");
    hdr.className = "group-header" + (state.collapsedGroups[bucket.id] ? " collapsed" : "");

    var chev = document.createElement("div");
    chev.className = "chevron";
    chev.textContent = "▾";
    hdr.appendChild(chev);

    var title = document.createElement("div");
    title.className = "title";
    title.textContent = groupLabel(bucket.id) || bucket.id;
    hdr.appendChild(title);

    var counts = document.createElement("div");
    counts.className = "group-counts";
    var total = bucket.tests.length;
    var totalSpan = document.createElement("span");
    totalSpan.className = "count total";
    totalSpan.textContent = total + (total === 1 ? " test" : " tests");
    counts.appendChild(totalSpan);
    ["failed","errored","timedOut","skipped","passed"].forEach(function (k) {
      var n = bucket.counts[k] || 0;
      if (n === 0) return;
      var c = document.createElement("span");
      c.className = "count " + k;
      c.textContent = n + " " + k;
      counts.appendChild(c);
    });
    hdr.appendChild(counts);

    hdr.addEventListener("click", function () {
      if (state.collapsedGroups[bucket.id]) {
        delete state.collapsedGroups[bucket.id];
      } else {
        state.collapsedGroups[bucket.id] = true;
      }
      renderRows();
    });

    return hdr;
  }

  function buildPager(pager, totalPages, startIdx, endIdx, totalItems) {
    pager.hidden = false;
    pager.innerHTML = "";

    var info = document.createElement("span");
    info.textContent = "Showing " + (startIdx + 1) + "–" + endIdx + " of " + totalItems;
    pager.appendChild(info);

    var prev = document.createElement("button");
    prev.textContent = "Previous";
    prev.disabled = state.page === 0;
    prev.onclick = function () { state.page--; renderRows(); };
    pager.appendChild(prev);

    var pageInfo = document.createElement("span");
    pageInfo.textContent = "Page " + (state.page + 1) + " of " + totalPages;
    pager.appendChild(pageInfo);

    var next = document.createElement("button");
    next.textContent = "Next";
    next.disabled = state.page >= totalPages - 1;
    next.onclick = function () { state.page++; renderRows(); };
    pager.appendChild(next);
  }

  function buildRow(t) {
    var row = document.createElement("div");
    row.className = "test-row";
    // For frameworks that emit multiple results for the same UID we need a key that is
    // unique per row, not per UID, otherwise expanding one would expand all of them.
    var rowKey = (t.attemptOf && t.attemptOf > 1) ? (t.uid + "#" + t.attemptIndex) : t.uid;
    if (state.expanded[rowKey]) row.classList.add("expanded");

    var outcome = document.createElement("div");
    var pill = document.createElement("span");
    pill.className = "outcome " + (t.outcome || "");
    pill.textContent = t.outcome || "unknown";
    outcome.appendChild(pill);
    row.appendChild(outcome);

    var name = document.createElement("div");
    name.className = "name";
    var display = document.createElement("span");
    display.className = "display";
    display.textContent = t.displayName || "(no display name)";
    name.appendChild(display);

    if (t.attemptOf && t.attemptOf > 1) {
      var badge = document.createElement("span");
      badge.className = "badge";
      badge.title = "Result " + t.attemptIndex + " of " + t.attemptOf + " seen for this test UID";
      badge.textContent = "#" + t.attemptIndex + " of " + t.attemptOf;
      name.appendChild(badge);
    }

    if (t.traits && t.traits.length) {
      for (var ti = 0; ti < t.traits.length; ti++) {
        var trait = t.traits[ti];
        var chip = document.createElement("span");
        chip.className = "trait";
        chip.textContent = trait.value ? (trait.key + "=" + trait.value) : trait.key;
        name.appendChild(chip);
      }
    }

    if (t.className || t.methodName) {
      var qual = document.createElement("span");
      qual.className = "qualified";
      qual.textContent = (t.className || "")
        + (t.className && t.methodName ? "." : "")
        + (t.methodName || "");
      name.appendChild(qual);
    }
    row.appendChild(name);

    var dur = document.createElement("div");
    dur.className = "duration";
    dur.textContent = fmtDuration(t.durationMs);
    row.appendChild(dur);

    var chev = document.createElement("div");
    chev.className = "chevron";
    chev.textContent = "›";
    row.appendChild(chev);

    var hasDetail = !!(t.errorMessage || t.stackTrace || t.standardOutput || t.standardError || t.exceptionType);
    row.style.cursor = hasDetail ? "pointer" : "default";

    var detailEl = null;
    function toggle() {
      if (!hasDetail) return;
      if (detailEl) {
        detailEl.parentNode.removeChild(detailEl);
        detailEl = null;
        row.classList.remove("expanded");
        delete state.expanded[rowKey];
      } else {
        detailEl = buildDetail(t);
        row.parentNode.insertBefore(detailEl, row.nextSibling);
        row.classList.add("expanded");
        state.expanded[rowKey] = true;
      }
    }

    row.addEventListener("click", toggle);

    // If previously expanded, re-create the panel.
    if (state.expanded[rowKey] && hasDetail) {
      // We can't insert here (row not yet in DOM); defer.
      setTimeout(function () {
        if (!row.parentNode) return;
        detailEl = buildDetail(t);
        row.parentNode.insertBefore(detailEl, row.nextSibling);
      }, 0);
    }

    return row;
  }

  function buildDetail(t) {
    var detail = document.createElement("div");
    detail.className = "detail";

    function addBlock(title, content) {
      if (content == null || content === "") return;
      var h = document.createElement("h4");
      h.textContent = title;
      detail.appendChild(h);
      var pre = document.createElement("pre");
      // Always use textContent — never innerHTML — to be immune to HTML
      // injection from test-controlled output.
      pre.textContent = content;
      detail.appendChild(pre);
    }

    if (t.exceptionType) {
      addBlock("Exception type", t.exceptionType);
    }
    addBlock("Error message", t.errorMessage);
    addBlock("Stack trace",   t.stackTrace);
    addBlock("Standard output", t.standardOutput);
    addBlock("Standard error",  t.standardError);

    if (detail.childNodes.length === 0) {
      var empty = document.createElement("div");
      empty.style.color = "var(--fg-muted)";
      empty.textContent = "No additional details captured.";
      detail.appendChild(empty);
    }

    return detail;
  }

  function bindToolbar() {
    document.querySelectorAll(".filter-pill").forEach(function (el) {
      el.addEventListener("click", function () {
        state.filter = el.getAttribute("data-filter");
        state.page = 0;
        updateFilterButtons();
        persist();
        renderRows();
      });
    });

    var search = document.getElementById("search");
    search.value = state.search;
    var debounce = null;
    search.addEventListener("input", function () {
      if (debounce) clearTimeout(debounce);
      debounce = setTimeout(function () {
        state.search = search.value;
        state.page = 0;
        persist();
        renderRows();
      }, 120);
    });

    document.querySelectorAll(".sortable").forEach(function (el) {
      el.addEventListener("click", function () {
        var key = el.getAttribute("data-sort");
        if (state.sort === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sort = key;
          state.sortDir = "asc";
        }
        updateSortHeaders();
        persist();
        renderRows();
      });
    });

    var groupSelect = document.getElementById("group-by");
    groupSelect.addEventListener("change", function () {
      state.groupBy = groupSelect.value;
      state.page = 0;
      state.collapsedGroups = Object.create(null);
      persist();
      renderRows();
    });
  }

  function updateFilterButtons() {
    document.querySelectorAll(".filter-pill").forEach(function (el) {
      el.classList.toggle("active", el.getAttribute("data-filter") === state.filter);
    });
  }

  function updateSortHeaders() {
    document.querySelectorAll(".sortable").forEach(function (el) {
      var active = el.getAttribute("data-sort") === state.sort;
      el.classList.toggle("active", active);
      var label = el.textContent.replace(/[ ▲▼]+$/, "");
      el.textContent = active
        ? label + " " + (state.sortDir === "asc" ? "▲" : "▼")
        : label;
    });
  }

  // Public hook for future "live" mode (e.g. OpenTelemetry / SSE driven).
  // A future extension can call window.mtpRender(updatedReport) to refresh
  // the page in place without reloading.
  window.mtpRender = function (newReport) {
    if (newReport && typeof newReport === "object") {
      report = newReport;
      tests = report.tests || [];
    }
    renderHeader();
    buildGroupSelector();
    updateFilterButtons();
    updateSortHeaders();
    renderRows();
  };

  renderHeader();
  buildGroupSelector();
  bindToolbar();
  updateFilterButtons();
  updateSortHeaders();
  renderRows();
})();
</script>
</body>
</html>
