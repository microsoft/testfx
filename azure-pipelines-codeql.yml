parameters:
  # Optionally do not publish to TSA. Useful for e.g. verifying fixes before PR.
- name: TSAEnabled
  displayName: Publish results to TSA
  type: boolean
  default: true

variables:
- template: /eng/common/templates-official/variables/pool-providers.yml
  # CG is handled in the primary CI pipeline
- name: skipComponentGovernanceDetection
  value: true
  # Force CodeQL enabled so it may be run on any branch
- name: Codeql.Enabled
  value: true
  # Do not let CodeQL 3000 Extension gate scan frequency
- name: Codeql.Cadence
  value: 0
  # CodeQL needs this plumbed along as a variable to enable TSA
- name: Codeql.TSAEnabled
  value: ${{ parameters.TSAEnabled }}
# Default expects tsaoptions.json under SourceRoot.
- name: Codeql.TSAOptionsPath
  value: '$(Build.SourcesDirectory)/.config/tsaoptions.json'

  # Build variables
- name: _BuildConfig
  value: Release

trigger: none

schedules:
  - cron: 0 0 * * *
    displayName: Daily midnight CodeQL run
    branches:
      include:
      - main
      - rel/4.2
    always: true

jobs:
- job: codeql
  displayName: CodeQL
  pool:
    name: $(DncEngInternalBuildPool)
    demands: ImageOverride -equals windows.vs2026.amd64
  timeoutInMinutes: 90

  steps:

  - task: PowerShell@2
    displayName: 'Install Windows SDK'
    inputs:
      targetType: filePath
      filePath: './eng/install-windows-sdk.ps1'
      failOnStderr: true
      showWarnings: true

  - task: CodeQL3000Init@0
    displayName: CodeQL Initialize

  # Force the .NET SDK MSBuild (x64) instead of the default VS x86 MSBuild on the
  # windows.vs2026.amd64 image. Since image version 2026.0529.211646 (deployed 2026-06-05),
  # the bundled VS MSBuild fails to spin up an x86 .NET task host for Arcade tasks declared
  # with Runtime="NET", producing MSB4216 on InstallDotNetCore. See dotnet/msbuild#13739.
  #
  # Skip the uap10.0.16299 target framework on this pipeline because MSBuild.Sdk.Extras'
  # Workarounds.targets refuses to build full-MSBuild targets under 'dotnet msbuild'.
  # UAP-specific code paths are still scanned via the other TFMs the affected projects
  # multi-target (net462, net8.0, net9.0).
  - script: eng\common\cibuild.cmd
      -configuration $(_BuildConfig)
      -prepareMachine
      -msbuildEngine dotnet
      /p:Test=false
      /p:SkipUapTargetFramework=true
    displayName: Windows Build

  - task: CodeQL3000Finalize@0
    displayName: CodeQL Finalize
